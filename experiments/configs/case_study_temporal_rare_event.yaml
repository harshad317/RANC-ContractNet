random_state: 0
output_dir: outputs/case_studies
dataset:
  kind: temporal_rare_event
baselines:
  - none
  - standard
  - robust
  - quantile
  - selector
  - ranc
constraints:
  global:
    hard_clauses:
      preserve_monotonicity: true
      allow_inverse_transform: true
      enforce_scale_invariance: true
    soft_clauses:
      prefer_drift_monitor: 1.0
  x0:
    hard_clauses:
      preserve_extreme_signal: true
      damp_outliers: false
    forbidden_distortions:
      - quantile_rank
    transform_preferences:
      - zscore
      - maxabs
